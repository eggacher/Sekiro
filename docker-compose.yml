# 开发环境依赖 + 完整服务一键启动
# 本地开发只起基础设施：docker compose up -d postgres redis
# 完整启动：docker compose up -d
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sekiro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sekiro
      POSTGRES_PASSWORD: sekiro123
      POSTGRES_DB: sekiro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sekiro -d sekiro"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sekiro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: sekiro-api:latest
    container_name: sekiro-api
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://sekiro:sekiro123@postgres:5432/sekiro?schema=public"
      DIRECT_DATABASE_URL: "postgresql://sekiro:sekiro123@postgres:5432/sekiro?schema=public"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: sekiro-web:latest
    container_name: sekiro-web
    restart: unless-stopped
    environment:
      API_URL: "http://api:3001"
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
