# 开发环境依赖一键启动
# 后端接入后使用：docker compose up -d
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sekiro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sekiro
      POSTGRES_PASSWORD: sekiro123
      POSTGRES_DB: sekiro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sekiro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
